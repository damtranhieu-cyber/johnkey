<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ Johnkey</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)),
        url("logo.png") center/cover no-repeat;
    background-attachment: fixed;
    color: white;
    overflow: hidden; 
    animation: bgPulse 10s infinite alternate; /* Hiệu ứng nền */
}

@keyframes bgPulse {
    0% { backdrop-filter: hue-rotate(0deg); }
    100% { backdrop-filter: hue-rotate(30deg); }
}

/* Thẻ Card: Hiệu ứng lơ lửng + Bóng đổ LED RGB đổi màu */
.card {
    width: 90%;
    max-width: 430px;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    animation: floatCard 4s ease-in-out infinite, rgbGlow 6s linear infinite;
}

@keyframes floatCard {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

@keyframes rgbGlow {
    0% { box-shadow: 0 0 30px rgba(0, 217, 255, 0.4); border-color: rgba(0, 217, 255, 0.3); }
    33% { box-shadow: 0 0 30px rgba(255, 0, 204, 0.4); border-color: rgba(255, 0, 204, 0.3); }
    66% { box-shadow: 0 0 30px rgba(204, 255, 0, 0.4); border-color: rgba(204, 255, 0, 0.3); }
    100% { box-shadow: 0 0 30px rgba(0, 217, 255, 0.4); border-color: rgba(0, 217, 255, 0.3); }
}

/* Hiệu ứng đập nhịp tim cho Logo */
.logo {
    width: 170px;
    height: 170px;
    object-fit: cover;
    border-radius: 50%;
    margin-bottom: 20px;
    animation: pulseLogo 1.5s infinite alternate;
}

@keyframes pulseLogo {
    0% { transform: scale(1); box-shadow: 0 0 15px rgba(0, 217, 255, 0.4); }
    100% { transform: scale(1.06); box-shadow: 0 0 40px rgba(0, 217, 255, 0.8), 0 0 20px rgba(255, 0, 204, 0.6); }
}

h1 {
    font-family: 'Arial Black', Impact, sans-serif;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 10px;
    color: #ffffff;
    text-shadow: 0 0 10px #00d9ff, 0 0 20px #00d9ff, 0 0 30px #0055ff;
}

.role {
    color: #00d9ff;
    margin-bottom: 8px;
    font-weight: bold;
    letter-spacing: 1px;
}
.phone {
    opacity: .85;
    margin-bottom: 15px;
}

/* Sóng nhạc ảo (Audio Visualizer) */
.equalizer {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 5px;
    height: 30px;
    margin-bottom: 20px;
}
.bar {
    width: 6px;
    background: #00d9ff;
    border-radius: 3px;
    animation: bounceBar 0.5s infinite alternate ease-in;
}
.bar:nth-child(1) { animation-delay: 0.1s; height: 10px; }
.bar:nth-child(2) { animation-delay: 0.3s; height: 25px; }
.bar:nth-child(3) { animation-delay: 0.0s; height: 15px; }
.bar:nth-child(4) { animation-delay: 0.2s; height: 30px; }
.bar:nth-child(5) { animation-delay: 0.4s; height: 20px; }

@keyframes bounceBar {
    0% { transform: scaleY(0.3); background: #00d9ff; }
    100% { transform: scaleY(1); background: #ff00cc; box-shadow: 0 0 10px #ff00cc; }
}

/* Nút bấm & Ánh sáng quét (Shine Sweep) */
a {
    display: block;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: white;
    margin: 12px 0;
    padding: 14px;
    border-radius: 14px;
    background: #1f1f40;
    transition: 0.3s;
    border: 1px solid transparent;
    z-index: 1;
}

a::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
    transform: skewX(-25deg);
    transition: 0.5s;
    z-index: -1;
}

a:hover {
    background: #00bfff;
    transform: scale(1.05);
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 0 20px rgba(0, 191, 255, 0.6);
}

a:hover::before {
    left: 150%;
}

/* Bộ điều khiển nhạc */
.music-controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    border-radius: 20px;
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.15);
    box-shadow: 0 0 15px rgba(0,200,255,.2);
    z-index: 1000;
}
.music-controls button {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    outline: none;
    transition: transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}
.music-controls button:hover {
    transform: scale(1.15);
}
.music-controls input[type="range"] {
    width: 80px;
    cursor: pointer;
    accent-color: #00d9ff;
}

/* Khung hiển thị số người xem góc phải */
.view-counter {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 20px;
    backdrop-filter: blur(14px);
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.15);
    box-shadow: 0 0 15px rgba(255, 42, 42, 0.4);
    font-size: 14px;
    font-weight: bold;
    color: white;
    z-index: 1000;
}
.live-dot {
    width: 8px;
    height: 8px;
    background-color: #ff2a2a;
    border-radius: 50%;
    box-shadow: 0 0 8px #ff2a2a;
    animation: blink 0.8s infinite alternate;
}
.eye-icon {
    font-size: 16px;
}

@keyframes blink {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0.3; transform: scale(0.8); }
}
</style>
</head>
<body>

<!-- Khung đếm mắt xem Live -->
<div class="view-counter">
    <div class="live-dot"></div>
    <span class="eye-icon">👁️</span>
    <span id="view-count">200</span>
</div>

<div class="card">
    <img src="logo.png" class="logo" alt="DJ Johnkey">

    <h1>DJ JOHNKEY</h1>
    <div class="role">DJ • Music Producer</div>
    <div class="phone">📞 0352181674</div>

    <!-- Sóng nhạc (Audio Visualizer) -->
    <div class="equalizer">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>

    <a href="https://www.facebook.com/share/174Vz5A9uA/" target="_blank">Facebook</a>
    <a href="http://zalo.me/84352181674" target="_blank">Zalo</a>
    <a href="http://t.me/quandayno1" target="_blank">Telegram</a>
    <a href="https://t.me/nhachethan" target="_blank">Kênh nonstop</a>
    <a href="https://t.me/tracklotnew" target="_blank">Kênh Track Nhạc DJ</a>
</div>

<div class="music-controls">
    <button id="play-pause-btn" title="Phát/Tạm dừng">⏸️</button>
    <span style="font-size: 14px;">🔉</span>
    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" title="Chỉnh âm lượng">
    <span style="font-size: 14px;">🔊</span>
</div>

<audio id="bg-music" autoplay loop>
    <source src="nhacnen.mp3" type="audio/mpeg">
    Trình duyệt của bạn không hỗ trợ thẻ audio.
</audio>

<script>
    // --- PHẦN NHẠC NỀN ---
    const audio = document.getElementById('bg-music');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const volumeSlider = document.getElementById('volume-slider');

    audio.volume = volumeSlider.value;

    playPauseBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play().catch(err => console.log("Bị chặn: ", err));
            playPauseBtn.textContent = '⏸️';
        } else {
            audio.pause();
            playPauseBtn.textContent = '▶️';
        }
    });

    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    function autoPlayMusic() {
        audio.play().then(() => {
            playPauseBtn.textContent = '⏸️';
            document.removeEventListener('click', autoPlayMusic);
            document.removeEventListener('touchstart', autoPlayMusic);
        }).catch(error => console.log("Đợi tương tác..."));
    }

    document.addEventListener('click', autoPlayMusic);
    document.addEventListener('touchstart', autoPlayMusic);

    // --- PHẦN ĐẾM MẮT XEM (LIVE VIEWS) ---
    const viewCountElement = document.getElementById('view-count');
    let currentViews = 200 + Math.floor(Math.random() * 30); 
    viewCountElement.innerText = currentViews;

    setInterval(() => {
        const change = Math.floor(Math.random() * 6) - 2; 
        currentViews += change;
        if (currentViews < 200) {
            currentViews = 200 + Math.floor(Math.random() * 5); 
        }
        viewCountElement.innerText = currentViews;
    }, 2500);
</script>

</body>
</html>
